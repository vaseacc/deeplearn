<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroFlow — Login</title>
  <style>
    :root {
      --bg: #06060e;
      --surface: rgba(14, 14, 32, 0.85);
      --surface-light: rgba(22, 22, 48, 0.75);
      --blue: #5b8def;
      --blue-glow: rgba(91, 141, 239, 0.45);
      --purple: #9b6dff;
      --text: #e0e0ec;
      --text-secondary: #9898b8;
      --border: rgba(255, 255, 255, 0.07);
      --border-glow: rgba(255, 255, 255, 0.12);
      --radius: 16px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(91, 141, 239, 0.05) 0%, transparent 60%);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 30px;
      width: 360px;
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .logo-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      box-shadow: 0 0 18px var(--blue-glow);
      display: inline-block;
      margin-bottom: 12px;
    }
    h2 {
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    p.subtitle {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    input {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 16px var(--blue-glow);
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 24px;
      border: 1px solid var(--border-glow);
      background: rgba(91,141,239,0.15);
      color: #fff;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 500;
      transition: 0.2s;
      letter-spacing: 0.3px;
    }
    .btn:hover {
      background: rgba(91,141,239,0.28);
      box-shadow: 0 0 20px var(--blue-glow);
    }
    .btn.google {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn.google:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--border-glow);
      box-shadow: 0 0 15px rgba(255,255,255,0.08);
    }
    .btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .error {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 8px;
      min-height: 20px;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 16px 0;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-dot"></div>
    <h2>NeuroFlow</h2>
    <p class="subtitle">Cognitive Training Lab</p>

    <!-- Google Sign-In Button -->
    <button class="btn google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <!-- Email / Password -->
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="loginBtn">Log In</button>
    <button class="btn secondary" id="signupBtn">Create Account</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <script type="module">
    import {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      GoogleAuthProvider,
      signInWithPopup
    } from "./firebase.js";

    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');

    // Redirect if already logged in
    onAuthStateChanged((user) => {
      if (user) window.location.href = "/";
    });

    // Google Sign‑In
    document.getElementById('googleBtn').addEventListener('click', async () => {
      try {
        errorMsg.textContent = '';
        await signInWithPopup(GoogleAuthProvider);
        window.location.href = "/";
      } catch (e) {
        errorMsg.textContent = e.message;
      }
    });

    // Email/Password Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      try {
        errorMsg.textContent = '';
        await signInWithEmailAndPassword(emailInput.value, passInput.value);
        window.location.href = "/";
      } catch (e) {
        errorMsg.textContent = e.message;
      }
    });

    // Email/Password Sign Up
    document.getElementById('signupBtn').addEventListener('click', async () => {
      try {
        errorMsg.textContent = '';
        await createUserWithEmailAndPassword(emailInput.value, passInput.value);
        window.location.href = "/";
      } catch (e) {
        errorMsg.textContent = e.message;
      }
    });
  </script>
</body>
</html>
