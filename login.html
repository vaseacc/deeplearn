<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroFlow — Login</title>
  <style>
    /* Reuse the same CSS variables and styles as the rest of the app */
    :root {
      --bg: #06060e;
      --surface: rgba(14, 14, 32, 0.85);
      --blue: #5b8def;
      --blue-glow: rgba(91, 141, 239, 0.45);
      --purple: #9b6dff;
      --text: #e0e0ec;
      --text-secondary: #9898b8;
      --border: rgba(255, 255, 255, 0.07);
      --border-glow: rgba(255, 255, 255, 0.12);
      --radius: 16px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(91, 141, 239, 0.05) 0%, transparent 60%);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 30px;
      width: 360px;
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .login-card h2 {
      margin-bottom: 8px;
      font-weight: 600;
    }
    .login-card p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    input {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 16px var(--blue-glow);
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 24px;
      border: 1px solid var(--border-glow);
      background: rgba(91,141,239,0.15);
      color: #fff;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: 0.2s;
    }
    .btn:hover {
      background: rgba(91,141,239,0.28);
      box-shadow: 0 0 20px var(--blue-glow);
    }
    .btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .error {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 8px;
    }
    .logo-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      box-shadow: 0 0 18px var(--blue-glow);
      display: inline-block;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-dot"></div>
    <h2>NeuroFlow</h2>
    <p>Cognitive Training Lab</p>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="loginBtn">Log In</button>
    <button class="btn secondary" id="signupBtn">Create Account</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <script type="module">
    import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "./firebase.js";

    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "/";
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      try {
        errorMsg.textContent = '';
        await signInWithEmailAndPassword(auth, emailInput.value, passInput.value);
        window.location.href = "/";
      } catch (e) {
        errorMsg.textContent = e.message;
      }
    });

    document.getElementById('signupBtn').addEventListener('click', async () => {
      try {
        errorMsg.textContent = '';
        await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value);
        window.location.href = "/";
      } catch (e) {
        errorMsg.textContent = e.message;
      }
    });
  </script>
</body>
</html>
