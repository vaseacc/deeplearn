<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFlow — Deep Focus Run</title>
    <style>
        :root {
            --bg: #06060e;
            --surface: rgba(14, 14, 32, 0.85);
            --surface-light: rgba(22, 22, 48, 0.75);
            --blue: #5b8def;
            --blue-glow: rgba(91, 141, 239, 0.45);
            --purple: #9b6dff;
            --purple-glow: rgba(155, 109, 255, 0.4);
            --cyan: #4dd9c1;
            --cyan-glow: rgba(77, 217, 193, 0.35);
            --amber: #f59e0b;
            --red: #ef4444;
            --green: #4ade80;
            --text: #e0e0ec;
            --text-secondary: #9898b8;
            --border: rgba(255, 255, 255, 0.07);
            --border-glow: rgba(255, 255, 255, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(91, 141, 239, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 40%, rgba(155, 109, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(77, 217, 193, 0.03) 0%, transparent 45%);
        }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

        nav {
            position: sticky; top:0; z-index:100;
            display:flex; align-items:center; justify-content:space-between;
            padding:10px 16px;
            background: rgba(10,10,22,0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom:1px solid var(--border);
            gap: 12px;
            height: var(--nav-height, 56px);
        }
        .nav-logo {
            display:flex; align-items:center; gap:10px;
            font-size:1.2rem; font-weight:700; letter-spacing:-0.3px;
            color:#fff; white-space:nowrap; text-decoration:none; cursor:pointer;
            flex-shrink: 0;
        }
        .logo-dot {
            width:24px; height:24px; border-radius:50%;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            box-shadow: 0 0 18px var(--blue-glow);
            animation: logoPulse 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow:0 0 14px var(--blue-glow); }
            50% { box-shadow:0 0 28px var(--purple-glow), 0 0 42px var(--blue-glow); }
        }
        .nav-links {
            display:flex; gap:4px; flex-wrap:wrap;
            justify-content: center;
            flex: 1;
        }
        .nav-links a {
            text-decoration:none; background:transparent; border:1px solid transparent;
            color:var(--text-secondary); padding:6px 12px; border-radius:18px;
            cursor:pointer; font-size:0.8rem; font-family:var(--font);
            transition:var(--transition); white-space:nowrap;
        }
        .nav-links a:hover, .nav-links a.active {
            color:#fff; border-color:var(--border-glow);
            background:rgba(255,255,255,0.04);
            box-shadow:0 0 14px rgba(91,141,239,0.12);
        }
        
        /* Profile button styles */
        .nav-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-light);
            padding: 4px 10px 4px 4px;
            border-radius: 22px;
            border: 1px solid var(--border);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            position: relative;
        }
        .nav-profile:hover {
            border-color: var(--border-glow);
            background: rgba(22, 22, 48, 0.9);
            transform: translateY(-1px);
        }
        .nav-profile:active {
            transform: translateY(0);
        }
        .nav-profile .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(91, 141, 239, 0.3);
        }
        .nav-profile .level-tag {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
            transition: opacity 0.2s ease;
        }
        .nav-profile .level-tag strong {
            color: #fff;
            font-weight: 600;
        }
        .nav-profile .dropdown-arrow {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
            flex-shrink: 0;
        }
        .nav-profile.active .dropdown-arrow {
            transform: rotate(180deg);
            opacity: 1;
        }

        /* Profile dropdown menu */
        .profile-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: rgba(14, 14, 32, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            padding: 6px;
            z-index: 1000;
            min-width: 150px;
            opacity: 0;
            transform: translateY(-8px) scale(0.95);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .profile-dropdown.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .profile-dropdown.hidden {
            display: none;
        }
        .profile-dropdown button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font);
            transition: all 0.15s ease;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile-dropdown button:hover {
            background: rgba(91, 141, 239, 0.15);
            color: #fff;
        }
        .profile-dropdown button:active {
            background: rgba(91, 141, 239, 0.25);
        }
        .profile-dropdown button svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* Mobile hamburger menu */
        .nav-menu-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .nav-menu-toggle:hover {
            border-color: var(--border-glow);
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }
        .nav-menu-toggle:active {
            transform: scale(0.95);
        }
        .nav-menu-toggle svg {
            width: 22px;
            height: 22px;
        }

        /* Responsive navigation */
        @media (max-width: 768px) {
            nav {
                padding: 8px 12px;
                flex-wrap: nowrap;
                height: var(--nav-height, 56px);
                gap: 8px;
            }
            .nav-logo {
                font-size: 1.05rem;
            }
            .logo-dot {
                width: 20px;
                height: 20px;
            }
            .nav-menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-left: auto;
            }
            .nav-profile {
                padding: 3px 6px 3px 3px;
            }
            .nav-profile .avatar {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            .nav-profile .level-tag {
                font-size: 0.65rem;
            }
            .nav-links {
                position: absolute;
                top: var(--nav-height, 56px);
                left: 0;
                right: 0;
                background: rgba(10, 10, 22, 0.98);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border-bottom: 1px solid var(--border);
                flex-direction: column;
                gap: 2px;
                padding: 8px;
                max-height: 0;
                overflow: hidden;
                opacity: 0;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            }
            .nav-links.open {
                max-height: 280px;
                opacity: 1;
            }
            .nav-links a {
                padding: 10px 14px;
                border-radius: 8px;
                text-align: left;
                background: transparent;
                font-size: 0.85rem;
            }
            .nav-links a:active {
                background: rgba(255, 255, 255, 0.06);
            }
            .profile-dropdown {
                right: 0;
                min-width: 130px;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 6px 10px;
            }
            .nav-logo {
                font-size: 0.95rem;
            }
            .logo-dot {
                width: 18px;
                height: 18px;
            }
            .nav-profile .level-tag {
                display: none;
            }
            .nav-profile {
                padding: 3px;
            }
            .nav-profile .avatar {
                width: 32px;
                height: 32px;
                font-size: 0.75rem;
            }
            .nav-profile .dropdown-arrow {
                display: none;
            }
            .profile-dropdown {
                right: -5px;
                min-width: 120px;
            }
        }

        .page-container {
            max-width:700px; margin:30px auto; padding:0 20px 60px;
            text-align:center;
        }
        .btn {
            display:inline-block; padding:12px 28px; border-radius:24px;
            border:1px solid var(--border-glow); background:rgba(91,141,239,0.14);
            color:#fff; cursor:pointer; font-family:var(--font); font-size:0.95rem;
            transition:var(--transition); margin-top:16px;
        }
        .btn:hover {
            background:rgba(91,141,239,0.28); box-shadow:0 0 24px var(--blue-glow);
            border-color:rgba(255,255,255,0.22);
        }
        .btn.running {
            background:rgba(239,68,68,0.18); border-color:rgba(239,68,68,0.45);
            animation: btnWarn 1.5s ease-in-out infinite;
        }
        @keyframes btnWarn {
            0%,100% { box-shadow:0 0 8px rgba(239,68,68,0.2); }
            50% { box-shadow:0 0 20px rgba(239,68,68,0.4); }
        }
        .overlay {
            display:none; position:fixed; inset:0; z-index:200;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:20px;
        }
        .overlay.open { display:flex; }
        .overlay .close-btn {
            position:absolute; top:18px; right:24px;
            background:var(--surface); border:1px solid var(--border); color:#fff;
            width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:1.1rem;
            transition:var(--transition); z-index:10; display:flex; align-items:center; justify-content:center;
        }
        .overlay .close-btn:hover { border-color:#fff; box-shadow:0 0 18px rgba(255,255,255,0.2); }
        .task-display {
            font-size:5rem; min-width:150px; min-height:150px;
            display:flex; align-items:center; justify-content:center;
            border-radius:50%; background:rgba(255,255,255,0.02);
            border:2px solid rgba(255,255,255,0.06); user-select:none; cursor:pointer;
            transition:0.12s ease;
        }
        .task-display.correct { border-color:var(--green); box-shadow:0 0 50px rgba(74,222,128,0.5); animation:correctPulse 0.35s ease-out; }
        .task-display.wrong { border-color:var(--red); box-shadow:0 0 35px rgba(239,68,68,0.5); animation:shake 0.35s ease; }
        @keyframes correctPulse {
            0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)}
        }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 50%{transform:translateX(9px)} 75%{transform:translateX(-5px)}
        }
        .target-indicator { font-size:0.85rem; color:var(--text-secondary); letter-spacing:0.8px; text-transform:uppercase; }
        .target-indicator span { font-size:2.5rem; display:inline-block; margin:0 8px; color:#fff; vertical-align:middle; }
        .score-live { font-size:1rem; color:var(--cyan); letter-spacing:0.4px; }
        .distraction-popup {
            position:fixed; z-index:210; padding:8px 14px;
            background:rgba(30,30,55,0.9); border:1px solid rgba(255,255,255,0.14);
            border-radius:18px; color:#fff; font-size:0.75rem; pointer-events:none;
            animation:distractSlide 2.2s ease-in-out forwards;
            box-shadow:0 4px 20px rgba(0,0,0,0.5);
        }
        @keyframes distractSlide {
            0%{opacity:0;transform:translateX(100px) scale(0.9)}
            18%{opacity:1;transform:translateX(0) scale(1)}
            75%{opacity:1;transform:translateX(0) scale(1)}
            100%{opacity:0;transform:translateX(-60px) scale(0.85)}
        }
        .distraction-particle {
            position:fixed; z-index:209; width:7px; height:7px; border-radius:50%;
            pointer-events:none; animation:particleDrift 2.8s ease-in-out forwards;
        }
        @keyframes particleDrift {
            0%{opacity:0;transform:translate(0,0) scale(0)}
            25%{opacity:0.7;transform:translate(35px,-55px) scale(1.3)}
            100%{opacity:0;transform:translate(-25px,-170px) scale(0.2)}
        }
        .endurance-info {
            position:absolute; top:60px; right:24px;
            font-size:0.75rem; color:var(--amber);
            background:rgba(245,158,11,0.1); padding:6px 12px;
            border-radius:12px; border:1px solid rgba(245,158,11,0.2);
            z-index:5;
        }
        .summary-overlay {
            position:fixed; inset:0; z-index:250;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(10px);
            display:flex; align-items:center; justify-content:center;
        }
        .summary-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); padding:28px 24px;
            max-width:480px; width:100%; text-align:center;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><div class="logo-dot"></div>NeuroFlow</a>
        <button class="nav-menu-toggle" id="navMenuToggle" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="/">Dashboard</a>
            <a href="/focus">Focus</a>
            <a href="/memory">Memory</a>
            <a href="/endurance" class="active">Endurance</a>
            <a href="/forge">Forge</a>
            <a href="/insights">Insights</a>
        </div>
        <button class="nav-profile" id="profileTrigger" aria-haspopup="true" aria-expanded="false">
            <div class="avatar">N</div>
            <span class="level-tag">Level <strong id="navLevel">0</strong> Mind</span>
            <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 12 12"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <div class="profile-dropdown hidden" id="profileDropdown">
            <button id="signOutDropdownBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
            </button>
        </div>
    </nav>

    <div class="page-container">
        <h2 style="margin-bottom:6px;">⏳ Deep Focus Run</h2>
        <p style="color:var(--text-secondary); max-width:500px; margin:0 auto 16px;">
            Cognitive endurance training. A sustained attention session that tracks your performance stability over time.
        </p>
        <button class="btn" id="startBtn">Start Endurance Run</button>
    </div>

    <div class="overlay" id="exerciseOverlay">
        <button class="close-btn" id="closeBtn">✕</button>
        <div class="endurance-info" id="enduranceInfo">⏱ 0:00 | Stability: 100%</div>
        <div class="target-indicator">Click when you see: <span id="targetSymbol">▲</span></div>
        <div class="task-display" id="taskDisplay">●</div>
        <div class="score-live" id="liveScore">Score: 0 | Hits: 0</div>
    </div>

    <script type="module">
        import { onAuthStateChanged, loadUserState, saveUserState } from './firebase.js';
        
        (function() {
            const XP_PER_LEVEL = 1000;
            let currentUser = null;
            let state = null;

            // Initialize auth state listener
            onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    state = await loadUserState(user.uid);
                    updateNavLevel();
                    updateSignOutVisibility(true);
                } else {
                    currentUser = null;
                    state = null;
                    updateNavLevel();
                    updateSignOutVisibility(false);
                    window.location.href = '/login';
                }
            });

            function defaultState() {
                return {
                    xp:0, level:0, totalSessions:0, streak:0, lastSessionDate:null,
                    metrics:{focus:0, memory:0, stability:0, endurance:0, resistance:0},
                    evolutionStage:0, sessionHistory:[], forgeItems:[],
                };
            }

            async function saveState() {
                if (!currentUser || !state) return;
                try {
                    await saveUserState(currentUser.uid, state);
                } catch(e) {
                    console.error('Failed to save state:', e);
                }
            }

            async function updateStreak() {
                if (!currentUser) return;
                const today = new Date().toISOString().slice(0,10);
                if (state.lastSessionDate === today) return;
                if (state.lastSessionDate) {
                    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
                    state.streak = (state.lastSessionDate === yesterday) ? state.streak+1 : 1;
                } else {
                    state.streak = 1;
                }
                state.lastSessionDate = today;
                await saveState();
            }

            async function addXP(amount) {
                if (!currentUser) return;
                state.xp += amount;
                const newLevel = Math.floor(state.xp / XP_PER_LEVEL);
                if (newLevel > state.level) {
                    state.level = newLevel;
                    state.evolutionStage = Math.min(7, state.evolutionStage+1);
                }
                await saveState();
                updateNavLevel();
            }

            async function applyMetrics(f,m,s,e,r) {
                if (!currentUser) return;
                const alpha = 0.35;
                state.metrics.focus = state.metrics.focus*(1-alpha) + f*alpha;
                state.metrics.memory = state.metrics.memory*(1-alpha) + m*alpha;
                state.metrics.stability = state.metrics.stability*(1-alpha) + s*alpha;
                state.metrics.endurance = state.metrics.endurance*(1-alpha) + e*alpha;
                state.metrics.resistance = state.metrics.resistance*(1-alpha) + r*alpha;
                Object.keys(state.metrics).forEach(k => state.metrics[k] = Math.min(100, Math.max(0, state.metrics[k])));
                await saveState();
            }

            function updateNavLevel() {
                const levelEl = document.getElementById('navLevel');
                if (levelEl && state) {
                    levelEl.textContent = state.level;
                }
            }

            function updateSignOutVisibility(isSignedIn) {
                const signOutBtn = document.getElementById('signOutDropdownBtn');
                if (signOutBtn) {
                    signOutBtn.style.display = isSignedIn ? 'flex' : 'none';
                }
            }

            let exerciseActive = false;
            let focusData = {};
            let focusTimer = null;
            let enduranceInterval = null;

            function startExercise() {
                if (exerciseActive) return;
                exerciseActive = true;
                const symbols = ['▲','●','■','✦','◆','⬟','⬢','◈'];
                focusData = {
                    target: symbols[Math.floor(Math.random()*symbols.length)],
                    symbols,
                    hits:0, misses:0, falseAlarms:0, round:0, speed:1100,
                    distractionsShown:0, distractionsResisted:0,
                    performanceWindows:[],
                    startTime: Date.now(),
                };
                document.getElementById('targetSymbol').textContent = focusData.target;
                document.getElementById('liveScore').textContent = 'Score: 0 | Hits: 0';
                document.getElementById('taskDisplay').textContent = '●';
                document.getElementById('taskDisplay').className = 'task-display';
                document.getElementById('exerciseOverlay').classList.add('open');
                document.getElementById('startBtn').classList.add('running');
                document.getElementById('startBtn').textContent = 'Endurance Active...';
                updateEnduranceInfo();
                enduranceInterval = setInterval(() => {
                    if (!exerciseActive) { clearInterval(enduranceInterval); return; }
                    focusData.speed = Math.max(280, focusData.speed - 6);
                    updateEnduranceInfo();
                    // Apply small endurance boost during session
                    const elapsed = (Date.now() - focusData.startTime) / 1000;
                    const enduranceVal = Math.min(100, elapsed / 60 * 30);
                    applyMetrics(0, 0, 0, enduranceVal, 0);
                }, 10000);
                nextSymbol();
            }

            function updateEnduranceInfo() {
                const elapsed = Math.floor((Date.now() - focusData.startTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                const recent = focusData.performanceWindows.filter(w => Date.now() - w.time < 15000);
                const stability = recent.length > 0 ? Math.round(recent.filter(w => w.success).length / recent.length * 100) : 100;
                document.getElementById('enduranceInfo').textContent =
                    `⏱ ${mins}:${secs.toString().padStart(2,'0')} | Stability: ${stability}%`;
            }

            function nextSymbol() {
                if (!exerciseActive) return;
                focusData.round++;
                const isTarget = Math.random() < 0.33;
                const current = isTarget ? focusData.target : focusData.symbols.filter(s=>s!==focusData.target)[Math.floor(Math.random()*(focusData.symbols.length-1))];
                document.getElementById('taskDisplay').textContent = current;
                document.getElementById('taskDisplay').className = 'task-display';
                if (focusData.round > 4 && Math.random() < 0.22) triggerDistraction();
                const wasTarget = isTarget;
                const snapRound = focusData.round;
                focusTimer = setTimeout(() => {
                    if (exerciseActive && focusData.round === snapRound && wasTarget) {
                        focusData.misses++;
                        focusData.performanceWindows.push({time: Date.now(), success: false});
                        updateLiveScore();
                        updateEnduranceInfo();
                    }
                    nextSymbol();
                }, focusData.speed);
            }

            function handleClick() {
                if (!exerciseActive) return;
                const display = document.getElementById('taskDisplay');
                const current = display.textContent;
                if (current === focusData.target) {
                    focusData.hits++;
                    focusData.performanceWindows.push({time: Date.now(), success: true});
                    if (focusData.distractionsShown > 0 && Math.random() < 0.7) focusData.distractionsResisted++;
                    display.className = 'task-display correct';
                } else {
                    focusData.falseAlarms++;
                    focusData.performanceWindows.push({time: Date.now(), success: false});
                    display.className = 'task-display wrong';
                }
                updateLiveScore();
                updateEnduranceInfo();
                clearTimeout(focusTimer);
                setTimeout(() => { display.className = 'task-display'; nextSymbol(); }, 200);
            }

            function updateLiveScore() {
                const score = Math.max(0, focusData.hits*10 - focusData.misses*5 - focusData.falseAlarms*8);
                document.getElementById('liveScore').textContent = `Score: ${score} | Hits: ${focusData.hits}`;
            }

            function triggerDistraction() {
                focusData.distractionsShown++;
                if (Math.random() < 0.5) {
                    const popup = document.createElement('div');
                    popup.className = 'distraction-popup';
                    popup.textContent = ['⚡ Notice','📩 Message','🔔 Alert','💬 Ping'][Math.floor(Math.random()*4)];
                    popup.style.top = (12+Math.random()*55)+'%';
                    popup.style.right = (5+Math.random()*22)+'%';
                    document.body.appendChild(popup);
                    setTimeout(() => popup.remove(), 2300);
                } else {
                    for (let i=0; i<3; i++) {
                        const p = document.createElement('div');
                        p.className = 'distraction-particle';
                        p.style.background = ['#ff6b9d','#ffca5f','#5be0ff','#c084fc'][Math.floor(Math.random()*4)];
                        p.style.left = (25+Math.random()*50)+'%';
                        p.style.top = (35+Math.random()*40)+'%';
                        document.body.appendChild(p);
                        setTimeout(() => p.remove(), 3000);
                    }
                }
            }

            function stopExercise() {
                if (!exerciseActive) return;
                exerciseActive = false;
                clearTimeout(focusTimer);
                clearInterval(enduranceInterval);
                document.getElementById('exerciseOverlay').classList.remove('open');
                document.getElementById('startBtn').classList.remove('running');
                document.getElementById('startBtn').textContent = 'Start Endurance Run';
                const d = focusData;
                const totalTargets = d.hits + d.misses;
                const accuracy = totalTargets>0 ? d.hits/totalTargets*100 : 0;
                const falseRate = d.round>0 ? d.falseAlarms/d.round*100 : 0;
                const resistance = d.distractionsShown>0 ? d.distractionsResisted/d.distractionsShown*100 : 100;
                const sessionFocus = Math.min(100, accuracy*0.7 + resistance*0.3);
                const sessionStability = Math.min(100, 100-falseRate);
                const duration = Math.round((Date.now() - d.startTime) / 1000);
                const enduranceVal = Math.min(100, duration / 60 * 35);
                applyMetrics(sessionFocus, 0, sessionStability, enduranceVal, resistance);
                const xp = d.hits*15 + d.distractionsResisted*20 + Math.floor(duration / 10);
                addXP(xp);
                updateStreak();
                state.totalSessions++;
                state.sessionHistory.push({type:'endurance', date:new Date().toISOString(), accuracy, falseRate, resistance, hits:d.hits, duration, xp});
                saveState();
                updateNavLevel();
                showSummary({accuracy, falseRate, resistance, hits:d.hits, misses:d.misses, duration, xp});
            }

            function showSummary(data) {
                const overlay = document.createElement('div');
                overlay.className = 'summary-overlay';
                const mins = Math.floor(data.duration / 60);
                const secs = data.duration % 60;
                overlay.innerHTML = `
                <div class="summary-card">
                  <h2>📊 Endurance Run Complete</h2>
                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; text-align:left; margin:16px 0;">
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Accuracy</span><span>${Math.round(data.accuracy)}%</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Resistance</span><span>${Math.round(data.resistance)}%</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Duration</span><span>${mins}:${secs.toString().padStart(2,'0')}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Hits</span><span>${data.hits}</span></div>
                  </div>
                  <p style="color:var(--cyan);">+${data.xp} XP</p>
                  <button class="btn" onclick="this.closest('.summary-overlay').remove()">Close</button>
                </div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
            }

            // Event listeners
            document.getElementById('startBtn').addEventListener('click', startExercise);
            document.getElementById('closeBtn').addEventListener('click', stopExercise);
            document.getElementById('taskDisplay').addEventListener('click', handleClick);
            document.getElementById('exerciseOverlay').addEventListener('click', function(e) {
                if (e.target === this) handleClick();
            });
            document.addEventListener('keydown', function(e) {
                if ((e.key===' ' || e.key==='Enter') && exerciseActive) { e.preventDefault(); handleClick(); }
                if (e.key==='Escape' && exerciseActive) stopExercise();
            });

            // Mobile menu toggle
            const navMenuToggle = document.getElementById('navMenuToggle');
            const navLinks = document.getElementById('navLinks');
            
            if (navMenuToggle && navLinks) {
                navMenuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('open');
                });
                
                // Close mobile menu when clicking a link
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // Profile dropdown functionality
            const profileTrigger = document.getElementById('profileTrigger');
            const profileDropdown = document.getElementById('profileDropdown');
            const signOutDropdownBtn = document.getElementById('signOutDropdownBtn');

            if (profileTrigger && profileDropdown) {
                profileTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = profileDropdown.classList.contains('open');
                    if (isOpen) {
                        closeDropdown();
                    } else {
                        openDropdown();
                    }
                });

                function openDropdown() {
                    profileDropdown.classList.remove('hidden');
                    requestAnimationFrame(() => {
                        profileDropdown.classList.add('open');
                        profileTrigger.classList.add('active');
                        profileTrigger.setAttribute('aria-expanded', 'true');
                    });
                }

                function closeDropdown() {
                    profileDropdown.classList.remove('open');
                    profileTrigger.classList.remove('active');
                    profileTrigger.setAttribute('aria-expanded', 'false');
                    setTimeout(() => {
                        if (!profileDropdown.classList.contains('open')) {
                            profileDropdown.classList.add('hidden');
                        }
                    }, 200);
                }

                document.addEventListener('click', (e) => {
                    if (!profileTrigger.contains(e.target) && !profileDropdown.contains(e.target)) {
                        closeDropdown();
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        closeDropdown();
                    }
                });
            }

            if (signOutDropdownBtn) {
                signOutDropdownBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    try {
                        await window.signOut();
                        window.location.href = '/login';
                    } catch (err) {
                        console.error('Sign out error:', err);
                    }
                });
            }
        })();
    </script>
</body>
</html>
