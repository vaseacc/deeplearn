<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFlow — Memory Forge</title>
    <style>
        :root {
            --bg: #06060e;
            --surface: rgba(14, 14, 32, 0.85);
            --surface-light: rgba(22, 22, 48, 0.75);
            --blue: #5b8def;
            --blue-glow: rgba(91, 141, 239, 0.45);
            --purple: #9b6dff;
            --purple-glow: rgba(155, 109, 255, 0.4);
            --cyan: #4dd9c1;
            --cyan-glow: rgba(77, 217, 193, 0.35);
            --amber: #f59e0b;
            --red: #ef4444;
            --green: #4ade80;
            --text: #e0e0ec;
            --text-secondary: #9898b8;
            --border: rgba(255, 255, 255, 0.07);
            --border-glow: rgba(255, 255, 255, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(91, 141, 239, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 40%, rgba(155, 109, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(77, 217, 193, 0.03) 0%, transparent 45%);
        }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

        nav {
            position: sticky; top:0; z-index:100;
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 24px;
            background: rgba(10,10,22,0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom:1px solid var(--border);
            flex-wrap:wrap; gap:8px;
        }
        .nav-logo {
            display:flex; align-items:center; gap:10px;
            font-size:1.3rem; font-weight:700; letter-spacing:-0.3px;
            color:#fff; white-space:nowrap; text-decoration:none;
        }
        .logo-dot {
            width:26px; height:26px; border-radius:50%;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            box-shadow: 0 0 18px var(--blue-glow);
            animation: logoPulse 2.5s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow:0 0 14px var(--blue-glow); }
            50% { box-shadow:0 0 28px var(--purple-glow), 0 0 42px var(--blue-glow); }
        }
        .nav-links { display:flex; gap:4px; flex-wrap:wrap; }
        .nav-links a {
            text-decoration:none; background:transparent; border:1px solid transparent;
            color:var(--text-secondary); padding:7px 14px; border-radius:18px;
            cursor:pointer; font-size:0.85rem; font-family:var(--font);
            transition:var(--transition); white-space:nowrap;
        }
        .nav-links a:hover, .nav-links a.active {
            color:#fff; border-color:var(--border-glow);
            background:rgba(255,255,255,0.04);
            box-shadow:0 0 14px rgba(91,141,239,0.12);
        }
        .nav-profile {
            display:flex; align-items:center; gap:8px;
            background:var(--surface-light); padding:6px 12px 6px 6px;
            border-radius:22px; border:1px solid var(--border); cursor:pointer; white-space:nowrap;
        }
        .nav-profile .avatar {
            width:28px; height:28px; border-radius:50%;
            background:linear-gradient(135deg, var(--purple), var(--blue));
            display:flex; align-items:center; justify-content:center;
            font-size:0.7rem; font-weight:700; color:#fff;
        }
        .nav-profile .level-tag { font-size:0.78rem; color:var(--text-secondary); letter-spacing:0.2px; }
        .nav-profile .level-tag strong { color:#fff; font-weight:600; }
        .nav-profile .dropdown-arrow { transition:transform 0.2s ease; }
        .nav-profile.active .dropdown-arrow { transform:rotate(180deg); }

        .profile-dropdown {
            position:absolute; top:calc(100% + 8px); right:16px;
            background:rgba(14,14,32,0.95); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
            border:1px solid var(--border); border-radius:12px;
            box-shadow:0 8px 32px rgba(0,0,0,0.5); padding:8px; z-index:1000;
        }
        .profile-dropdown.hidden { display:none; }
        .profile-dropdown button {
            background:transparent; border:none; color:var(--text-secondary);
            padding:8px 16px; border-radius:8px; cursor:pointer;
            font-size:0.85rem; font-family:var(--font); transition:var(--transition); width:100%; text-align:left;
        }
        .profile-dropdown button:hover { background:rgba(255,255,255,0.08); color:#fff; }

        .page-container {
            max-width:700px; margin:30px auto; padding:0 20px 60px;
        }
        .btn {
            display:inline-block; padding:10px 22px; border-radius:22px;
            border:1px solid var(--border-glow); background:rgba(91,141,239,0.14);
            color:#fff; cursor:pointer; font-family:var(--font); font-size:0.88rem;
            transition:var(--transition); margin-top:8px; white-space:nowrap;
        }
        .btn:hover {
            background:rgba(91,141,239,0.28); box-shadow:0 0 24px var(--blue-glow);
            border-color:rgba(255,255,255,0.22);
        }
        .btn.secondary {
            background:rgba(155,109,255,0.12); border-color:rgba(155,109,255,0.3);
        }
        .btn.secondary:hover {
            background:rgba(155,109,255,0.25); box-shadow:0 0 20px var(--purple-glow);
        }
        .btn.running {
            background:rgba(239,68,68,0.18); border-color:rgba(239,68,68,0.45);
            animation: btnWarn 1.5s ease-in-out infinite;
        }
        @keyframes btnWarn {
            0%,100% { box-shadow:0 0 8px rgba(239,68,68,0.2); }
            50% { box-shadow:0 0 20px rgba(239,68,68,0.4); }
        }
        .forge-input-area {
            display:flex; gap:8px; flex-wrap:wrap; margin:16px 0;
        }
        .forge-input-area input {
            flex:1; min-width:180px; padding:10px 14px; border-radius:10px;
            border:1px solid var(--border); background:var(--surface-light);
            color:#fff; font-family:var(--font); font-size:0.9rem; outline:none;
            transition:var(--transition);
        }
        .forge-input-area input:focus {
            border-color:var(--blue); box-shadow:0 0 16px var(--blue-glow);
        }
        .forge-list {
            display:flex; flex-wrap:wrap; gap:6px; margin:12px 0;
        }
        .forge-item {
            padding:6px 14px; border-radius:14px;
            background:rgba(155,109,255,0.12); border:1px solid rgba(155,109,255,0.2);
            font-size:0.8rem; color:#d4c8f0; cursor:pointer; transition:var(--transition);
            display:flex; align-items:center; gap:6px;
        }
        .forge-item:hover {
            background:rgba(155,109,255,0.25);
        }
        .forge-item.mastered {
            background:rgba(74,222,128,0.15); border-color:rgba(74,222,128,0.3);
            color:#a7f0c0;
        }
        .forge-item .delete-btn {
            cursor:pointer; opacity:0.5; font-size:0.7rem; margin-left:4px;
        }
        .forge-item .delete-btn:hover { opacity:1; color:var(--red); }
        .overlay {
            display:none; position:fixed; inset:0; z-index:200;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:20px;
        }
        .overlay.open { display:flex; }
        .overlay .close-btn {
            position:absolute; top:18px; right:24px;
            background:var(--surface); border:1px solid var(--border); color:#fff;
            width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:1.1rem;
            transition:var(--transition); z-index:10; display:flex; align-items:center; justify-content:center;
        }
        .overlay .close-btn:hover { border-color:#fff; box-shadow:0 0 18px rgba(255,255,255,0.2); }
        .score-live { font-size:1rem; color:var(--cyan); letter-spacing:0.4px; }
        .summary-overlay {
            position:fixed; inset:0; z-index:250;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(10px);
            display:flex; align-items:center; justify-content:center;
        }
        .summary-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); padding:28px 24px;
            max-width:480px; width:100%; text-align:center;
        }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><div class="logo-dot"></div>NeuroFlow</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="focus.html">Focus</a>
            <a href="memory.html">Memory</a>
            <a href="endurance.html">Endurance</a>
            <a href="forge.html" class="active">Forge</a>
            <a href="insights.html">Insights</a>
        </div>
        <button class="nav-profile" id="profileTrigger" aria-haspopup="true" aria-expanded="false">
            <div class="avatar">N</div>
            <span class="level-tag">Level <strong id="navLevel">0</strong> Mind</span>
            <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 12 12"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <div class="profile-dropdown hidden" id="profileDropdown">
            <button id="signOutDropdownBtn">Sign Out</button>
        </div>
    </nav>

    <div class="page-container">
        <h2 style="margin-bottom:6px;">🔨 Memory Forge</h2>
        <p style="color:var(--text-secondary); margin-bottom:8px;">
            Active recall training. Add your own study material — vocabulary, concepts, facts — and the system quizzes you using forced retrieval.
        </p>
        <div class="forge-input-area">
            <input type="text" id="questionInput" placeholder="Question / concept / term...">
            <input type="text" id="answerInput" placeholder="Expected answer...">
            <button class="btn secondary" onclick="addItem()">+ Add Item</button>
        </div>
        <div class="forge-list" id="forgeList"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
            <span style="font-size:0.75rem; color:var(--text-secondary);">
                Items: <strong id="forgeCount" style="color:#fff;">0</strong> | 
                Mastered: <strong id="forgeMasteredCount" style="color:#4ade80;">0</strong>
            </span>
            <button class="btn" id="startRecallBtn" onclick="startRecall()">Start Recall Quiz</button>
        </div>
    </div>

    <div class="overlay" id="recallOverlay">
        <button class="close-btn" onclick="stopRecall()">✕</button>
        <div id="forgeQuestion" style="font-size:1.3rem; color:#fff; text-align:center; max-width:500px;"></div>
        <input type="text" id="forgeAnswerInput" placeholder="Type your answer..." 
               style="padding:12px 18px; border-radius:10px; border:1px solid var(--border); background:var(--surface-light); 
                      color:#fff; font-family:var(--font); font-size:1rem; width:280px; outline:none; text-align:center;" autocomplete="off">
        <button class="btn" onclick="submitAnswer()">Submit</button>
        <div class="score-live" id="recallScoreLive">Reviewed: 0 | Mastered: 0</div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'neuroflow_v2';
            const XP_PER_LEVEL = 1000;

            function defaultState() {
                return {
                    xp:0, level:0, totalSessions:0, streak:0, lastSessionDate:null,
                    metrics:{focus:0, memory:0, stability:0, endurance:0, resistance:0},
                    evolutionStage:0, sessionHistory:[], forgeItems:[],
                };
            }

            let state = loadState();

            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) { const saved = JSON.parse(raw); return {...defaultState(), ...saved}; }
                } catch(e) {}
                return defaultState();
            }

            function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

            function updateStreak() {
                const today = new Date().toISOString().slice(0,10);
                if (state.lastSessionDate === today) return;
                if (state.lastSessionDate) {
                    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
                    state.streak = (state.lastSessionDate === yesterday) ? state.streak+1 : 1;
                } else {
                    state.streak = 1;
                }
                state.lastSessionDate = today;
                saveState();
            }

            function addXP(amount) {
                state.xp += amount;
                const newLevel = Math.floor(state.xp / XP_PER_LEVEL);
                if (newLevel > state.level) {
                    state.level = newLevel;
                    state.evolutionStage = Math.min(7, state.evolutionStage+1);
                }
                saveState();
            }

            function applyMetrics(f,m,s,e,r) {
                const alpha = 0.35;
                state.metrics.focus = state.metrics.focus*(1-alpha) + f*alpha;
                state.metrics.memory = state.metrics.memory*(1-alpha) + m*alpha;
                state.metrics.stability = state.metrics.stability*(1-alpha) + s*alpha;
                state.metrics.endurance = state.metrics.endurance*(1-alpha) + e*alpha;
                state.metrics.resistance = state.metrics.resistance*(1-alpha) + r*alpha;
                Object.keys(state.metrics).forEach(k => state.metrics[k] = Math.min(100, Math.max(0, state.metrics[k])));
                saveState();
            }

            function updateNavLevel() {
                document.getElementById('navLevel').textContent = state.level;
            }

            function renderForgeList() {
                const list = document.getElementById('forgeList');
                const countEl = document.getElementById('forgeCount');
                const masteredEl = document.getElementById('forgeMasteredCount');
                if (!list) return;
                list.innerHTML = state.forgeItems.map((item, i) => `
                    <span class="forge-item${item.mastery>=3?' mastered':''}" title="Mastery: ${item.mastery}/5">
                        ${item.question} → ${item.answer}
                        <span class="delete-btn" onclick="event.stopPropagation(); deleteItem(${i})">✕</span>
                    </span>
                `).join('');
                if (countEl) countEl.textContent = state.forgeItems.length;
                if (masteredEl) masteredEl.textContent = state.forgeItems.filter(i => i.mastery >= 3).length;
            }

            window.addItem = function() {
                const qInput = document.getElementById('questionInput');
                const aInput = document.getElementById('answerInput');
                if (!qInput || !aInput) return;
                const q = qInput.value.trim();
                const a = aInput.value.trim();
                if (!q || !a) return alert('Please fill in both fields.');
                state.forgeItems.push({ id: Date.now(), question: q, answer: a, mastery: 0, lastReviewed: null });
                qInput.value = '';
                aInput.value = '';
                saveState();
                renderForgeList();
            };

            window.deleteItem = function(index) {
                state.forgeItems.splice(index, 1);
                saveState();
                renderForgeList();
            };

            let recallActive = false;
            let recallData = {};

            window.startRecall = function() {
                if (recallActive) return;
                const dueItems = state.forgeItems.filter(i => i.mastery < 5);
                if (dueItems.length === 0) return alert('All items mastered! Add more material.');
                recallActive = true;
                recallData = { items: [...dueItems], currentIdx: 0, reviewed: 0, mastered: 0, startTime: Date.now() };
                document.getElementById('recallOverlay').classList.add('open');
                document.getElementById('recallScoreLive').textContent = 'Reviewed: 0 | Mastered: 0';
                showRecallQuestion();
            };

            function showRecallQuestion() {
                if (recallData.currentIdx >= recallData.items.length) {
                    finishRecall();
                    return;
                }
                const item = recallData.items[recallData.currentIdx];
                document.getElementById('forgeQuestion').textContent = '🔍 ' + item.question;
                document.getElementById('forgeAnswerInput').value = '';
                document.getElementById('forgeAnswerInput').focus();
                document.getElementById('recallScoreLive').textContent = 
                    `Reviewed: ${recallData.reviewed} | Mastered: ${recallData.mastered}`;
            }

            window.submitAnswer = function() {
                if (!recallActive) return;
                const input = document.getElementById('forgeAnswerInput');
                const userAnswer = input.value.trim();
                if (!userAnswer) return;
                const item = recallData.items[recallData.currentIdx];
                const correct = userAnswer.toLowerCase() === item.answer.toLowerCase();
                recallData.reviewed++;
                // update state item
                const stateItem = state.forgeItems.find(i => i.id === item.id);
                if (stateItem) {
                    if (correct) {
                        stateItem.mastery = Math.min(5, stateItem.mastery + 1);
                        if (stateItem.mastery >= 3 && !recallData.masteredItems) recallData.masteredItems = new Set();
                        if (stateItem.mastery >= 3 && recallData.masteredItems) recallData.masteredItems.add(stateItem.id);
                    } else {
                        stateItem.mastery = Math.max(0, stateItem.mastery - 1);
                    }
                    stateItem.lastReviewed = new Date().toISOString();
                }
                recallData.mastered = recallData.masteredItems ? recallData.masteredItems.size : 0;
                saveState();
                document.getElementById('forgeQuestion').textContent = correct ? '✓ Correct!' : '✗ The answer was: ' + item.answer;
                document.getElementById('forgeQuestion').style.color = correct ? '#4ade80' : '#ef4444';
                recallData.currentIdx++;
                setTimeout(() => {
                    document.getElementById('forgeQuestion').style.color = '#fff';
                    showRecallQuestion();
                }, 1000);
            };

            function finishRecall() {
                recallActive = false;
                document.getElementById('recallOverlay').classList.remove('open');
                const xp = recallData.reviewed * 20 + recallData.mastered * 30;
                addXP(xp);
                updateStreak();
                state.totalSessions++;
                state.sessionHistory.push({type:'forge', date:new Date().toISOString(), reviewed:recallData.reviewed, mastered:recallData.mastered, xp});
                saveState();
                updateNavLevel();
                renderForgeList();
                showSummary({reviewed: recallData.reviewed, mastered: recallData.mastered, xp});
            }

            window.stopRecall = function() {
                if (!recallActive) return;
                recallActive = false;
                document.getElementById('recallOverlay').classList.remove('open');
                // partial session? still count if any reviewed
                if (recallData.reviewed > 0) {
                    const xp = recallData.reviewed * 20 + recallData.mastered * 30;
                    addXP(xp);
                    updateStreak();
                    state.totalSessions++;
                    state.sessionHistory.push({type:'forge', date:new Date().toISOString(), reviewed:recallData.reviewed, mastered:recallData.mastered, xp});
                    saveState();
                    updateNavLevel();
                    renderForgeList();
                }
            };

            function showSummary(data) {
                const overlay = document.createElement('div');
                overlay.className = 'summary-overlay';
                overlay.innerHTML = `
                <div class="summary-card">
                  <h2>📊 Forge Session Complete</h2>
                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; text-align:left; margin:16px 0;">
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Reviewed</span><span>${data.reviewed}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Mastered</span><span>${data.mastered}</span></div>
                  </div>
                  <p style="color:var(--cyan);">+${data.xp} XP</p>
                  <button class="btn" onclick="this.closest('.summary-overlay').remove()">Close</button>
                </div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
            }

            document.getElementById('recallOverlay').addEventListener('click', function(e) { if (e.target === this) stopRecall(); });
            document.getElementById('forgeAnswerInput')?.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') submitAnswer();
            });
            document.addEventListener('keydown', function(e) { if (e.key==='Escape' && recallActive) stopRecall(); });

            // Profile dropdown functionality
            const profileTrigger = document.getElementById('profileTrigger');
            const profileDropdown = document.getElementById('profileDropdown');
            const signOutDropdownBtn = document.getElementById('signOutDropdownBtn');

            if (profileTrigger && profileDropdown) {
                profileTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = profileDropdown.classList.contains('open');
                    if (isOpen) {
                        profileDropdown.classList.add('hidden');
                        profileDropdown.classList.remove('open');
                        profileTrigger.classList.remove('active');
                        profileTrigger.setAttribute('aria-expanded', 'false');
                    } else {
                        profileDropdown.classList.remove('hidden');
                        profileDropdown.classList.add('open');
                        profileTrigger.classList.add('active');
                        profileTrigger.setAttribute('aria-expanded', 'true');
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!profileTrigger.contains(e.target) && !profileDropdown.contains(e.target)) {
                        profileDropdown.classList.add('hidden');
                        profileDropdown.classList.remove('open');
                        profileTrigger.classList.remove('active');
                        profileTrigger.setAttribute('aria-expanded', 'false');
                    }
                });
            }

            if (signOutDropdownBtn) {
                signOutDropdownBtn.addEventListener('click', async () => {
                    try {
                        await window.signOut();
                        window.location.href = '/login';
                    } catch (err) {
                        console.error('Sign out error:', err);
                    }
                });
            }

            renderForgeList();
            updateNavLevel();
        })();
    </script>
</body>
</html>
