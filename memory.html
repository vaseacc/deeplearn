<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFlow — Neural Recall</title>
    <style>
        :root {
            --bg: #06060e;
            --surface: rgba(14, 14, 32, 0.85);
            --surface-light: rgba(22, 22, 48, 0.75);
            --blue: #5b8def;
            --blue-glow: rgba(91, 141, 239, 0.45);
            --purple: #9b6dff;
            --purple-glow: rgba(155, 109, 255, 0.4);
            --cyan: #4dd9c1;
            --cyan-glow: rgba(77, 217, 193, 0.35);
            --amber: #f59e0b;
            --red: #ef4444;
            --green: #4ade80;
            --text: #e0e0ec;
            --text-secondary: #9898b8;
            --border: rgba(255, 255, 255, 0.07);
            --border-glow: rgba(255, 255, 255, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(91, 141, 239, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 40%, rgba(155, 109, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(77, 217, 193, 0.03) 0%, transparent 45%);
        }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

        nav {
            position: sticky; top:0; z-index:100;
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 24px;
            background: rgba(10,10,22,0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom:1px solid var(--border);
            flex-wrap:wrap; gap:8px;
        }
        .nav-logo {
            display:flex; align-items:center; gap:10px;
            font-size:1.3rem; font-weight:700; letter-spacing:-0.3px;
            color:#fff; white-space:nowrap; text-decoration:none;
        }
        .logo-dot {
            width:26px; height:26px; border-radius:50%;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            box-shadow: 0 0 18px var(--blue-glow);
            animation: logoPulse 2.5s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow:0 0 14px var(--blue-glow); }
            50% { box-shadow:0 0 28px var(--purple-glow), 0 0 42px var(--blue-glow); }
        }
        .nav-links { display:flex; gap:4px; flex-wrap:wrap; }
        .nav-links a {
            text-decoration:none; background:transparent; border:1px solid transparent;
            color:var(--text-secondary); padding:7px 14px; border-radius:18px;
            cursor:pointer; font-size:0.85rem; font-family:var(--font);
            transition:var(--transition); white-space:nowrap;
        }
        .nav-links a:hover, .nav-links a.active {
            color:#fff; border-color:var(--border-glow);
            background:rgba(255,255,255,0.04);
            box-shadow:0 0 14px rgba(91,141,239,0.12);
        }
        .nav-profile {
            display:flex; align-items:center; gap:8px;
            background:var(--surface-light); padding:6px 12px 6px 6px;
            border-radius:22px; border:1px solid var(--border); cursor:default; white-space:nowrap;
        }
        .nav-profile .avatar {
            width:28px; height:28px; border-radius:50%;
            background:linear-gradient(135deg, var(--purple), var(--blue));
            display:flex; align-items:center; justify-content:center;
            font-size:0.7rem; font-weight:700; color:#fff;
        }
        .nav-profile .level-tag { font-size:0.78rem; color:var(--text-secondary); letter-spacing:0.2px; }
        .nav-profile .level-tag strong { color:#fff; font-weight:600; }

        .page-container {
            max-width:700px; margin:30px auto; padding:0 20px 60px;
            text-align:center;
        }
        .btn {
            display:inline-block; padding:12px 28px; border-radius:24px;
            border:1px solid var(--border-glow); background:rgba(91,141,239,0.14);
            color:#fff; cursor:pointer; font-family:var(--font); font-size:0.95rem;
            transition:var(--transition); margin-top:16px;
        }
        .btn:hover {
            background:rgba(91,141,239,0.28); box-shadow:0 0 24px var(--blue-glow);
            border-color:rgba(255,255,255,0.22);
        }
        .btn.running {
            background:rgba(239,68,68,0.18); border-color:rgba(239,68,68,0.45);
            animation: btnWarn 1.5s ease-in-out infinite;
        }
        @keyframes btnWarn {
            0%,100% { box-shadow:0 0 8px rgba(239,68,68,0.2); }
            50% { box-shadow:0 0 20px rgba(239,68,68,0.4); }
        }
        .overlay {
            display:none; position:fixed; inset:0; z-index:200;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:20px;
        }
        .overlay.open { display:flex; }
        .overlay .close-btn {
            position:absolute; top:18px; right:24px;
            background:var(--surface); border:1px solid var(--border); color:#fff;
            width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:1.1rem;
            transition:var(--transition); z-index:10; display:flex; align-items:center; justify-content:center;
        }
        .overlay .close-btn:hover { border-color:#fff; box-shadow:0 0 18px rgba(255,255,255,0.2); }
        .mem-sequence-display {
            font-size:2.8rem; font-weight:700; letter-spacing:5px; color:#fff;
            min-height:70px; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
        }
        .mem-input-grid {
            display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:300px;
        }
        .mem-input-grid button {
            padding:14px; font-size:1.1rem; border-radius:12px;
            border:1px solid var(--border); background:var(--surface-light); color:#fff;
            cursor:pointer; font-family:var(--font); transition:var(--transition);
        }
        .mem-input-grid button:hover {
            border-color:#fff; box-shadow:0 0 14px var(--blue-glow);
            background:rgba(91,141,239,0.2);
        }
        .score-live { font-size:1rem; color:var(--cyan); letter-spacing:0.4px; }
        .summary-overlay {
            position:fixed; inset:0; z-index:250;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(10px);
            display:flex; align-items:center; justify-content:center;
        }
        .summary-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); padding:28px 24px;
            max-width:480px; width:100%; text-align:center;
        }
        .hidden { display:none !important; }
        @keyframes memPopIn {
            0% { transform:scale(0.3); opacity:0; }
            60% { transform:scale(1.15); }
            100% { transform:scale(1); opacity:1; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><div class="logo-dot"></div>NeuroFlow</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="focus.html">Focus</a>
            <a href="memory.html" class="active">Memory</a>
            <a href="endurance.html">Endurance</a>
            <a href="forge.html">Forge</a>
            <a href="insights.html">Insights</a>
        </div>
        <div class="nav-profile">
            <div class="avatar">N</div>
            <span class="level-tag">Level <strong id="navLevel">0</strong> Mind</span>
        </div>
    </nav>

    <div class="page-container">
        <h2 style="margin-bottom:6px;">🧠 Neural Recall</h2>
        <p style="color:var(--text-secondary); max-width:500px; margin:0 auto 16px;">
            Working memory training. Memorize a sequence, then recall it. Difficulty adapts — longer sequences as you improve.
        </p>
        <button class="btn" id="startBtn" onclick="startExercise()">Start Memory Session</button>
    </div>

    <div class="overlay" id="exerciseOverlay">
        <button class="close-btn" onclick="stopExercise()">✕</button>
        <div id="memPhaseLabel" style="color:var(--text-secondary);font-size:0.85rem;">Memorize the sequence</div>
        <div class="mem-sequence-display" id="memSequenceDisplay"></div>
        <div class="mem-input-grid hidden" id="memInputGrid"></div>
        <button class="btn hidden" id="memSubmitBtn" onclick="submitRecall()">Submit Recall</button>
        <div class="score-live" id="memScoreLive">Round: 0 | Correct: 0 | Best Len: 3</div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'neuroflow_v2';
            const XP_PER_LEVEL = 1000;

            function defaultState() {
                return {
                    xp:0, level:0, totalSessions:0, streak:0, lastSessionDate:null,
                    metrics:{focus:0, memory:0, stability:0, endurance:0, resistance:0},
                    evolutionStage:0, sessionHistory:[], forgeItems:[],
                };
            }

            let state = loadState();

            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) { const saved = JSON.parse(raw); return {...defaultState(), ...saved}; }
                } catch(e) {}
                return defaultState();
            }

            function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

            function updateStreak() {
                const today = new Date().toISOString().slice(0,10);
                if (state.lastSessionDate === today) return;
                if (state.lastSessionDate) {
                    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
                    state.streak = (state.lastSessionDate === yesterday) ? state.streak+1 : 1;
                } else {
                    state.streak = 1;
                }
                state.lastSessionDate = today;
                saveState();
            }

            function addXP(amount) {
                state.xp += amount;
                const newLevel = Math.floor(state.xp / XP_PER_LEVEL);
                if (newLevel > state.level) {
                    state.level = newLevel;
                    state.evolutionStage = Math.min(7, state.evolutionStage+1);
                }
                saveState();
            }

            function applyMetrics(f,m,s,e,r) {
                const alpha = 0.35;
                state.metrics.focus = state.metrics.focus*(1-alpha) + f*alpha;
                state.metrics.memory = state.metrics.memory*(1-alpha) + m*alpha;
                state.metrics.stability = state.metrics.stability*(1-alpha) + s*alpha;
                state.metrics.endurance = state.metrics.endurance*(1-alpha) + e*alpha;
                state.metrics.resistance = state.metrics.resistance*(1-alpha) + r*alpha;
                Object.keys(state.metrics).forEach(k => state.metrics[k] = Math.min(100, Math.max(0, state.metrics[k])));
                saveState();
            }

            function updateNavLevel() {
                document.getElementById('navLevel').textContent = state.level;
            }

            let exerciseActive = false;
            let memData = {};

            function startExercise() {
                if (exerciseActive) return;
                exerciseActive = true;
                memData = {
                    seq: [], userSeq: [], seqLen: 3, round: 0, correct: 0,
                    bestLen: 3, phase: 'observe', startTime: Date.now()
                };
                document.getElementById('exerciseOverlay').classList.add('open');
                document.getElementById('memScoreLive').textContent = 'Round: 0 | Correct: 0 | Best Len: 3';
                document.getElementById('startBtn').classList.add('running');
                document.getElementById('startBtn').textContent = 'Session Active...';
                nextRound();
            }

            function nextRound() {
                memData.userSeq = [];
                memData.seq = Array.from({length: memData.seqLen}, () => Math.floor(Math.random()*10));
                memData.phase = 'observe';
                document.getElementById('memPhaseLabel').textContent = '🔍 Memorize the sequence';
                document.getElementById('memInputGrid').classList.add('hidden');
                document.getElementById('memSubmitBtn').classList.add('hidden');
                const display = document.getElementById('memSequenceDisplay');
                display.innerHTML = '';
                let delay = 0;
                memData.seq.forEach((d, i) => {
                    setTimeout(() => {
                        if (!exerciseActive) return;
                        const span = document.createElement('span');
                        span.textContent = d;
                        span.style.cssText = 'font-size:2.8rem;font-weight:700;animation:memPopIn 0.3s ease-out;';
                        display.appendChild(span);
                        if (i === memData.seq.length - 1) {
                            setTimeout(() => {
                                if (!exerciseActive) return;
                                display.innerHTML = '<span style="color:var(--text-secondary);font-size:1rem;">— Recall the sequence —</span>';
                                memData.phase = 'recall';
                                document.getElementById('memPhaseLabel').textContent = '🧠 Recall the sequence';
                                buildGrid();
                                document.getElementById('memInputGrid').classList.remove('hidden');
                                document.getElementById('memSubmitBtn').classList.remove('hidden');
                            }, 900);
                        }
                    }, delay);
                    delay += 600;
                });
            }

            function buildGrid() {
                const grid = document.getElementById('memInputGrid');
                grid.innerHTML = '';
                for (let i=0; i<=9; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.onclick = () => {
                        memData.userSeq.push(i);
                        updateDisplay();
                        if (memData.userSeq.length === memData.seq.length) submitRecall();
                    };
                    grid.appendChild(btn);
                }
                const clr = document.createElement('button');
                clr.textContent = '⌫'; clr.style.gridColumn = 'span 2';
                clr.onclick = () => { memData.userSeq.pop(); updateDisplay(); };
                grid.appendChild(clr);
            }

            function updateDisplay() {
                const d = document.getElementById('memSequenceDisplay');
                d.innerHTML = memData.userSeq.map(n => `<span style="color:#4dd9c1;font-size:2.5rem;">${n}</span>`).join(' ') +
                    ' _'.repeat(Math.max(0, memData.seq.length - memData.userSeq.length));
            }

            function submitRecall() {
                if (memData.phase !== 'recall' || !exerciseActive) return;
                const correct = memData.userSeq.join(',') === memData.seq.join(',');
                memData.round++;
                if (correct) {
                    memData.correct++;
                    memData.seqLen = Math.min(9, memData.seqLen + 1);
                    memData.bestLen = Math.max(memData.bestLen, memData.seqLen);
                } else {
                    memData.seqLen = Math.max(2, memData.seqLen - 1);
                }
                document.getElementById('memScoreLive').textContent =
                    `Round: ${memData.round} | Correct: ${memData.correct} | Best Len: ${memData.bestLen}`;
                document.getElementById('memSequenceDisplay').innerHTML = correct ?
                    '<span style="color:#4ade80;font-size:1.5rem;">✓ Correct!</span>' :
                    `<span style="color:#ef4444;">✗ Was: ${memData.seq.join(' ')}</span>`;
                document.getElementById('memInputGrid').classList.add('hidden');
                document.getElementById('memSubmitBtn').classList.add('hidden');
                memData.phase = 'transition';
                setTimeout(() => { if (exerciseActive) nextRound(); }, 1300);
            }

            function stopExercise() {
                if (!exerciseActive) return;
                exerciseActive = false;
                document.getElementById('exerciseOverlay').classList.remove('open');
                document.getElementById('startBtn').classList.remove('running');
                document.getElementById('startBtn').textContent = 'Start Memory Session';
                const accuracy = memData.round > 0 ? memData.correct / memData.round * 100 : 0;
                applyMetrics(0, accuracy, accuracy*0.6, 0, 0);
                const xp = memData.correct * 30 + memData.bestLen * 10;
                addXP(xp);
                updateStreak();
                state.totalSessions++;
                state.sessionHistory.push({type:'memory', date:new Date().toISOString(), accuracy, rounds:memData.round, bestLen:memData.bestLen, xp});
                saveState();
                updateNavLevel();
                showSummary({accuracy, rounds:memData.round, bestLen:memData.bestLen, xp});
            }

            function showSummary(data) {
                const overlay = document.createElement('div');
                overlay.className = 'summary-overlay';
                overlay.innerHTML = `
                <div class="summary-card">
                  <h2>📊 Session Complete</h2>
                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; text-align:left; margin:16px 0;">
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Accuracy</span><span>${Math.round(data.accuracy)}%</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Best Length</span><span>${data.bestLen} digits</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Rounds</span><span>${data.rounds}</span></div>
                  </div>
                  <p style="color:var(--cyan);">+${data.xp} XP</p>
                  <button class="btn" onclick="this.closest('.summary-overlay').remove()">Close</button>
                </div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
            }

            document.getElementById('exerciseOverlay').addEventListener('click', function(e) { if (e.target === this) stopExercise(); });
            document.addEventListener('keydown', function(e) { if (e.key==='Escape' && exerciseActive) stopExercise(); });
            updateNavLevel();
        })();
    </script>
</body>
</html>
