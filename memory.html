<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFlow — Neural Recall</title>
    <style>
        :root {
            --bg: #06060e;
            --surface: rgba(14, 14, 32, 0.85);
            --surface-light: rgba(22, 22, 48, 0.75);
            --blue: #5b8def;
            --blue-glow: rgba(91, 141, 239, 0.45);
            --purple: #9b6dff;
            --purple-glow: rgba(155, 109, 255, 0.4);
            --cyan: #4dd9c1;
            --cyan-glow: rgba(77, 217, 193, 0.35);
            --amber: #f59e0b;
            --red: #ef4444;
            --green: #4ade80;
            --text: #e0e0ec;
            --text-secondary: #9898b8;
            --border: rgba(255, 255, 255, 0.07);
            --border-glow: rgba(255, 255, 255, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(91, 141, 239, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 40%, rgba(155, 109, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(77, 217, 193, 0.03) 0%, transparent 45%);
        }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

        nav {
            position: sticky; top:0; z-index:100;
            display:flex; align-items:center; justify-content:space-between;
            padding:10px 16px;
            background: rgba(10,10,22,0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom:1px solid var(--border);
            gap: 12px;
            height: var(--nav-height, 56px);
        }
        .nav-logo {
            display:flex; align-items:center; gap:10px;
            font-size:1.2rem; font-weight:700; letter-spacing:-0.3px;
            color:#fff; white-space:nowrap; text-decoration:none; cursor:pointer;
            flex-shrink: 0;
        }
        .logo-dot {
            width:24px; height:24px; border-radius:50%;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            box-shadow: 0 0 18px var(--blue-glow);
            animation: logoPulse 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow:0 0 14px var(--blue-glow); }
            50% { box-shadow:0 0 28px var(--purple-glow), 0 0 42px var(--blue-glow); }
        }
        .nav-links {
            display:flex; gap:4px; flex-wrap:wrap;
            justify-content: center;
            flex: 1;
        }
        .nav-links a {
            text-decoration:none; background:transparent; border:1px solid transparent;
            color:var(--text-secondary); padding:6px 12px; border-radius:18px;
            cursor:pointer; font-size:0.8rem; font-family:var(--font);
            transition:var(--transition); white-space:nowrap;
        }
        .nav-links a:hover, .nav-links a.active {
            color:#fff; border-color:var(--border-glow);
            background:rgba(255,255,255,0.04);
            box-shadow:0 0 14px rgba(91,141,239,0.12);
        }
        
        /* Profile button styles */
        .nav-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-light);
            padding: 4px 10px 4px 4px;
            border-radius: 22px;
            border: 1px solid var(--border);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            position: relative;
        }
        .nav-profile:hover {
            border-color: var(--border-glow);
            background: rgba(22, 22, 48, 0.9);
            transform: translateY(-1px);
        }
        .nav-profile:active {
            transform: translateY(0);
        }
        .nav-profile .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(91, 141, 239, 0.3);
        }
        .nav-profile .level-tag {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
            transition: opacity 0.2s ease;
        }
        .nav-profile .level-tag strong {
            color: #fff;
            font-weight: 600;
        }
        .nav-profile .dropdown-arrow {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
            flex-shrink: 0;
        }
        .nav-profile.active .dropdown-arrow {
            transform: rotate(180deg);
            opacity: 1;
        }

        /* Profile dropdown menu */
        .profile-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: rgba(14, 14, 32, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            padding: 6px;
            z-index: 1000;
            min-width: 150px;
            opacity: 0;
            transform: translateY(-8px) scale(0.95);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .profile-dropdown.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .profile-dropdown.hidden {
            display: none;
        }
        .profile-dropdown button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font);
            transition: all 0.15s ease;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile-dropdown button:hover {
            background: rgba(91, 141, 239, 0.15);
            color: #fff;
        }
        .profile-dropdown button:active {
            background: rgba(91, 141, 239, 0.25);
        }
        .profile-dropdown button svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* Mobile hamburger menu */
        .nav-menu-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .nav-menu-toggle:hover {
            border-color: var(--border-glow);
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }
        .nav-menu-toggle:active {
            transform: scale(0.95);
        }
        .nav-menu-toggle svg {
            width: 22px;
            height: 22px;
        }

        /* Responsive navigation */
        @media (max-width: 768px) {
            nav {
                padding: 8px 12px;
                flex-wrap: nowrap;
                height: var(--nav-height, 56px);
                gap: 8px;
            }
            .nav-logo {
                font-size: 1.05rem;
            }
            .logo-dot {
                width: 20px;
                height: 20px;
            }
            .nav-menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-left: auto;
            }
            .nav-profile {
                padding: 3px 6px 3px 3px;
            }
            .nav-profile .avatar {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            .nav-profile .level-tag {
                font-size: 0.65rem;
            }
            .nav-links {
                position: absolute;
                top: var(--nav-height, 56px);
                left: 0;
                right: 0;
                background: rgba(10, 10, 22, 0.98);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border-bottom: 1px solid var(--border);
                flex-direction: column;
                gap: 2px;
                padding: 8px;
                max-height: 0;
                overflow: hidden;
                opacity: 0;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            }
            .nav-links.open {
                max-height: 280px;
                opacity: 1;
            }
            .nav-links a {
                padding: 10px 14px;
                border-radius: 8px;
                text-align: left;
                background: transparent;
                font-size: 0.85rem;
            }
            .nav-links a:active {
                background: rgba(255, 255, 255, 0.06);
            }
            .profile-dropdown {
                right: 0;
                min-width: 130px;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 6px 10px;
            }
            .nav-logo {
                font-size: 0.95rem;
            }
            .logo-dot {
                width: 18px;
                height: 18px;
            }
            .nav-profile .level-tag {
                display: none;
            }
            .nav-profile {
                padding: 3px;
            }
            .nav-profile .avatar {
                width: 32px;
                height: 32px;
                font-size: 0.75rem;
            }
            .nav-profile .dropdown-arrow {
                display: none;
            }
            .profile-dropdown {
                right: -5px;
                min-width: 120px;
            }
        }

        .page-container {
            max-width:700px; margin:30px auto; padding:0 20px 60px;
            text-align:center;
        }
        .btn {
            display:inline-block; padding:12px 28px; border-radius:24px;
            border:1px solid var(--border-glow); background:rgba(91,141,239,0.14);
            color:#fff; cursor:pointer; font-family:var(--font); font-size:0.95rem;
            transition:var(--transition); margin-top:16px;
        }
        .btn:hover {
            background:rgba(91,141,239,0.28); box-shadow:0 0 24px var(--blue-glow);
            border-color:rgba(255,255,255,0.22);
        }
        .btn.running {
            background:rgba(239,68,68,0.18); border-color:rgba(239,68,68,0.45);
            animation: btnWarn 1.5s ease-in-out infinite;
        }
        @keyframes btnWarn {
            0%,100% { box-shadow:0 0 8px rgba(239,68,68,0.2); }
            50% { box-shadow:0 0 20px rgba(239,68,68,0.4); }
        }
        .overlay {
            display:none; position:fixed; inset:0; z-index:200;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:20px;
        }
        .overlay.open { display:flex; }
        .overlay .close-btn {
            position:absolute; top:18px; right:24px;
            background:var(--surface); border:1px solid var(--border); color:#fff;
            width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:1.1rem;
            transition:var(--transition); z-index:10; display:flex; align-items:center; justify-content:center;
        }
        .overlay .close-btn:hover { border-color:#fff; box-shadow:0 0 18px rgba(255,255,255,0.2); }
        .mem-sequence-display {
            font-size:2.8rem; font-weight:700; letter-spacing:5px; color:#fff;
            min-height:70px; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
        }
        .mem-input-grid {
            display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:300px;
        }
        .mem-input-grid button {
            padding:14px; font-size:1.1rem; border-radius:12px;
            border:1px solid var(--border); background:var(--surface-light); color:#fff;
            cursor:pointer; font-family:var(--font); transition:var(--transition);
        }
        .mem-input-grid button:hover {
            border-color:#fff; box-shadow:0 0 14px var(--blue-glow);
            background:rgba(91,141,239,0.2);
        }
        .score-live { font-size:1rem; color:var(--cyan); letter-spacing:0.4px; }
        .summary-overlay {
            position:fixed; inset:0; z-index:250;
            background:rgba(6,6,14,0.94); backdrop-filter:blur(10px);
            display:flex; align-items:center; justify-content:center;
        }
        .summary-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); padding:28px 24px;
            max-width:480px; width:100%; text-align:center;
        }
        .hidden { display:none !important; }
        @keyframes memPopIn {
            0% { transform:scale(0.3); opacity:0; }
            60% { transform:scale(1.15); }
            100% { transform:scale(1); opacity:1; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><div class="logo-dot"></div>NeuroFlow</a>
        <button class="nav-menu-toggle" id="navMenuToggle" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="/">Dashboard</a>
            <a href="/focus">Focus</a>
            <a href="/memory" class="active">Memory</a>
            <a href="/endurance">Endurance</a>
            <a href="/forge">Forge</a>
            <a href="/insights">Insights</a>
        </div>
        <button class="nav-profile" id="profileTrigger" aria-haspopup="true" aria-expanded="false">
            <div class="avatar">N</div>
            <span class="level-tag">Level <strong id="navLevel">0</strong> Mind</span>
            <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 12 12"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <div class="profile-dropdown hidden" id="profileDropdown">
            <button id="signOutDropdownBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
            </button>
        </div>
    </nav>

    <div class="page-container">
        <h2 style="margin-bottom:6px;">🧠 Neural Recall</h2>
        <p style="color:var(--text-secondary); max-width:500px; margin:0 auto 16px;">
            Working memory training. Memorize a sequence, then recall it. Difficulty adapts — longer sequences as you improve.
        </p>
        <button class="btn" id="startBtn">Start Memory Session</button>
    </div>

    <div class="overlay" id="exerciseOverlay">
        <button class="close-btn" id="closeBtn">✕</button>
        <div id="memPhaseLabel" style="color:var(--text-secondary);font-size:0.85rem;">Memorize the sequence</div>
        <div class="mem-sequence-display" id="memSequenceDisplay"></div>
        <div class="mem-input-grid hidden" id="memInputGrid"></div>
        <button class="btn hidden" id="memSubmitBtn">Submit Recall</button>
        <div class="score-live" id="memScoreLive">Round: 0 | Correct: 0 | Best Len: 3</div>
    </div>

    <script type="module">
        import { onAuthStateChanged, loadUserState, saveUserState } from './firebase.js';
        
        (function() {
            const XP_PER_LEVEL = 1000;
            let currentUser = null;
            let state = null;

            // Initialize auth state listener
            onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    state = await loadUserState(user.uid);
                    updateNavLevel();
                    updateSignOutVisibility(true);
                } else {
                    currentUser = null;
                    state = null;
                    updateNavLevel();
                    updateSignOutVisibility(false);
                    window.location.href = '/login';
                }
            });

            function defaultState() {
                return {
                    xp:0, level:0, totalSessions:0, streak:0, lastSessionDate:null,
                    metrics:{focus:0, memory:0, stability:0, endurance:0, resistance:0},
                    evolutionStage:0, sessionHistory:[], forgeItems:[],
                };
            }

            async function saveState() {
                if (!currentUser || !state) return;
                try {
                    await saveUserState(currentUser.uid, state);
                } catch(e) {
                    console.error('Failed to save state:', e);
                }
            }

            async function updateStreak() {
                if (!currentUser) return;
                const today = new Date().toISOString().slice(0,10);
                if (state.lastSessionDate === today) return;
                if (state.lastSessionDate) {
                    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
                    state.streak = (state.lastSessionDate === yesterday) ? state.streak+1 : 1;
                } else {
                    state.streak = 1;
                }
                state.lastSessionDate = today;
                await saveState();
            }

            async function addXP(amount) {
                if (!currentUser) return;
                state.xp += amount;
                const newLevel = Math.floor(state.xp / XP_PER_LEVEL);
                if (newLevel > state.level) {
                    state.level = newLevel;
                    state.evolutionStage = Math.min(7, state.evolutionStage+1);
                }
                await saveState();
                updateNavLevel();
            }

            async function applyMetrics(f,m,s,e,r) {
                if (!currentUser) return;
                const alpha = 0.35;
                state.metrics.focus = state.metrics.focus*(1-alpha) + f*alpha;
                state.metrics.memory = state.metrics.memory*(1-alpha) + m*alpha;
                state.metrics.stability = state.metrics.stability*(1-alpha) + s*alpha;
                state.metrics.endurance = state.metrics.endurance*(1-alpha) + e*alpha;
                state.metrics.resistance = state.metrics.resistance*(1-alpha) + r*alpha;
                Object.keys(state.metrics).forEach(k => state.metrics[k] = Math.min(100, Math.max(0, state.metrics[k])));
                await saveState();
            }

            function updateNavLevel() {
                const levelEl = document.getElementById('navLevel');
                if (levelEl && state) {
                    levelEl.textContent = state.level;
                }
            }

            function updateSignOutVisibility(isSignedIn) {
                const signOutBtn = document.getElementById('signOutDropdownBtn');
                if (signOutBtn) {
                    signOutBtn.style.display = isSignedIn ? 'flex' : 'none';
                }
            }

            let exerciseActive = false;
            let memData = {};

            function startExercise() {
                if (exerciseActive) return;
                exerciseActive = true;
                memData = {
                    seq: [], userSeq: [], seqLen: 3, round: 0, correct: 0,
                    bestLen: 3, phase: 'observe', startTime: Date.now()
                };
                document.getElementById('exerciseOverlay').classList.add('open');
                document.getElementById('memScoreLive').textContent = 'Round: 0 | Correct: 0 | Best Len: 3';
                document.getElementById('startBtn').classList.add('running');
                document.getElementById('startBtn').textContent = 'Session Active...';
                nextRound();
            }

            function nextRound() {
                memData.userSeq = [];
                memData.seq = Array.from({length: memData.seqLen}, () => Math.floor(Math.random()*10));
                memData.phase = 'observe';
                document.getElementById('memPhaseLabel').textContent = '🔍 Memorize the sequence';
                document.getElementById('memInputGrid').classList.add('hidden');
                document.getElementById('memSubmitBtn').classList.add('hidden');
                const display = document.getElementById('memSequenceDisplay');
                display.innerHTML = '';
                let delay = 0;
                memData.seq.forEach((d, i) => {
                    setTimeout(() => {
                        if (!exerciseActive) return;
                        const span = document.createElement('span');
                        span.textContent = d;
                        span.style.cssText = 'font-size:2.8rem;font-weight:700;animation:memPopIn 0.3s ease-out;';
                        display.appendChild(span);
                        if (i === memData.seq.length - 1) {
                            setTimeout(() => {
                                if (!exerciseActive) return;
                                display.innerHTML = '<span style="color:var(--text-secondary);font-size:1rem;">— Recall the sequence —</span>';
                                memData.phase = 'recall';
                                document.getElementById('memPhaseLabel').textContent = '🧠 Recall the sequence';
                                buildGrid();
                                document.getElementById('memInputGrid').classList.remove('hidden');
                                document.getElementById('memSubmitBtn').classList.remove('hidden');
                            }, 900);
                        }
                    }, delay);
                    delay += 600;
                });
            }

            function buildGrid() {
                const grid = document.getElementById('memInputGrid');
                grid.innerHTML = '';
                for (let i=0; i<=9; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.onclick = () => {
                        memData.userSeq.push(i);
                        updateDisplay();
                        if (memData.userSeq.length === memData.seq.length) submitRecall();
                    };
                    grid.appendChild(btn);
                }
                const clr = document.createElement('button');
                clr.textContent = '⌫'; clr.style.gridColumn = 'span 2';
                clr.onclick = () => { memData.userSeq.pop(); updateDisplay(); };
                grid.appendChild(clr);
            }

            function updateDisplay() {
                const d = document.getElementById('memSequenceDisplay');
                d.innerHTML = memData.userSeq.map(n => `<span style="color:#4dd9c1;font-size:2.5rem;">${n}</span>`).join(' ') +
                    ' _'.repeat(Math.max(0, memData.seq.length - memData.userSeq.length));
            }

            function submitRecall() {
                if (memData.phase !== 'recall' || !exerciseActive) return;
                const correct = memData.userSeq.join(',') === memData.seq.join(',');
                memData.round++;
                if (correct) {
                    memData.correct++;
                    memData.seqLen = Math.min(9, memData.seqLen + 1);
                    memData.bestLen = Math.max(memData.bestLen, memData.seqLen);
                } else {
                    memData.seqLen = Math.max(2, memData.seqLen - 1);
                }
                document.getElementById('memScoreLive').textContent =
                    `Round: ${memData.round} | Correct: ${memData.correct} | Best Len: ${memData.bestLen}`;
                document.getElementById('memSequenceDisplay').innerHTML = correct ?
                    '<span style="color:#4ade80;font-size:1.5rem;">✓ Correct!</span>' :
                    `<span style="color:#ef4444;">✗ Was: ${memData.seq.join(' ')}</span>`;
                document.getElementById('memInputGrid').classList.add('hidden');
                document.getElementById('memSubmitBtn').classList.add('hidden');
                memData.phase = 'transition';
                setTimeout(() => { if (exerciseActive) nextRound(); }, 1300);
            }

            function stopExercise() {
                if (!exerciseActive) return;
                exerciseActive = false;
                document.getElementById('exerciseOverlay').classList.remove('open');
                document.getElementById('startBtn').classList.remove('running');
                document.getElementById('startBtn').textContent = 'Start Memory Session';
                const accuracy = memData.round > 0 ? memData.correct / memData.round * 100 : 0;
                applyMetrics(0, accuracy, accuracy*0.6, 0, 0);
                const xp = memData.correct * 30 + memData.bestLen * 10;
                addXP(xp);
                updateStreak();
                state.totalSessions++;
                state.sessionHistory.push({type:'memory', date:new Date().toISOString(), accuracy, rounds:memData.round, bestLen:memData.bestLen, xp});
                saveState();
                updateNavLevel();
                showSummary({accuracy, rounds:memData.round, bestLen:memData.bestLen, xp});
            }

            function showSummary(data) {
                const overlay = document.createElement('div');
                overlay.className = 'summary-overlay';
                overlay.innerHTML = `
                <div class="summary-card">
                  <h2>📊 Session Complete</h2>
                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; text-align:left; margin:16px 0;">
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Accuracy</span><span>${Math.round(data.accuracy)}%</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Best Length</span><span>${data.bestLen} digits</span></div>
                    <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:6px;"><span>Rounds</span><span>${data.rounds}</span></div>
                  </div>
                  <p style="color:var(--cyan);">+${data.xp} XP</p>
                  <button class="btn" onclick="this.closest('.summary-overlay').remove()">Close</button>
                </div>`;
                document.body.appendChild(overlay);
                overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
            }

            // Event listeners (replaces onclick attributes)
            document.getElementById('startBtn').addEventListener('click', startExercise);
            document.getElementById('closeBtn').addEventListener('click', stopExercise);
            document.getElementById('memSubmitBtn').addEventListener('click', submitRecall);
            document.getElementById('exerciseOverlay').addEventListener('click', function(e) { if (e.target === this) stopExercise(); });
            document.addEventListener('keydown', function(e) { if (e.key==='Escape' && exerciseActive) stopExercise(); });

            updateNavLevel();

            // Mobile menu toggle
            const navMenuToggle = document.getElementById('navMenuToggle');
            const navLinks = document.getElementById('navLinks');
            
            if (navMenuToggle && navLinks) {
                navMenuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('open');
                });
                
                // Close mobile menu when clicking a link
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // Profile dropdown functionality
            const profileTrigger = document.getElementById('profileTrigger');
            const profileDropdown = document.getElementById('profileDropdown');
            const signOutDropdownBtn = document.getElementById('signOutDropdownBtn');

            if (profileTrigger && profileDropdown) {
                profileTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = profileDropdown.classList.contains('open');
                    if (isOpen) {
                        closeDropdown();
                    } else {
                        openDropdown();
                    }
                });

                function openDropdown() {
                    profileDropdown.classList.remove('hidden');
                    requestAnimationFrame(() => {
                        profileDropdown.classList.add('open');
                        profileTrigger.classList.add('active');
                        profileTrigger.setAttribute('aria-expanded', 'true');
                    });
                }

                function closeDropdown() {
                    profileDropdown.classList.remove('open');
                    profileTrigger.classList.remove('active');
                    profileTrigger.setAttribute('aria-expanded', 'false');
                    setTimeout(() => {
                        if (!profileDropdown.classList.contains('open')) {
                            profileDropdown.classList.add('hidden');
                        }
                    }, 200);
                }

                document.addEventListener('click', (e) => {
                    if (!profileTrigger.contains(e.target) && !profileDropdown.contains(e.target)) {
                        closeDropdown();
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        closeDropdown();
                    }
                });
            }

            if (signOutDropdownBtn) {
                signOutDropdownBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    try {
                        await window.signOut();
                        window.location.href = '/login';
                    } catch (err) {
                        console.error('Sign out error:', err);
                    }
                });
            }
        })();
    </script>
</body>
</html>
